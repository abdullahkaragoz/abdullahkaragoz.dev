<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Yılan</title>
<style>
  :root {
    --neon: #00ffd5;
    --neon2: #ff2e88;
    --food: #ffe600;
    --bg: #07070f;
    --grid: rgba(0, 255, 213, 0.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(circle at 50% 0%, #141430 0%, var(--bg) 70%);
    color: #e8e8f5;
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    user-select: none;
  }
  h1 {
    font-size: clamp(20px, 6vw, 34px);
    margin: 8px 0 4px;
    letter-spacing: 4px;
    font-weight: 700;
    color: var(--neon);
    text-shadow: 0 0 8px var(--neon), 0 0 22px rgba(0,255,213,.5);
  }
  .scorebar {
    display: flex; gap: 22px; align-items: center;
    font-size: 15px; letter-spacing: 1px; margin-bottom: 10px;
  }
  .scorebar b { color: var(--neon2); text-shadow: 0 0 8px rgba(255,46,136,.6); }
  .scorebar .hi b { color: var(--food); text-shadow: 0 0 8px rgba(255,230,0,.6); }
  .soundbtn {
    background: rgba(0,255,213,.08);
    border: 1px solid rgba(0,255,213,.35);
    border-radius: 8px; cursor: pointer;
    font-size: 15px; line-height: 1;
    padding: 4px 8px; color: #e8e8f5;
    transition: transform .08s ease, background .15s ease;
  }
  .soundbtn:active { transform: scale(.9); }
  .soundbtn.muted { opacity: .5; border-color: rgba(255,255,255,.2); }
  .wrap { position: relative; }
  canvas {
    background: rgba(5,5,15,.6);
    border: 2px solid rgba(0,255,213,.35);
    border-radius: 14px;
    box-shadow: 0 0 30px rgba(0,255,213,.25), inset 0 0 30px rgba(0,255,213,.05);
    display: block;
    touch-action: none;
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5,5,15,.78);
    border-radius: 14px;
    text-align: center; padding: 20px;
    backdrop-filter: blur(2px);
  }
  .overlay.hidden { display: none; }
  .overlay h2 {
    margin: 0 0 6px; font-size: 26px; color: var(--neon2);
    text-shadow: 0 0 12px rgba(255,46,136,.6); letter-spacing: 2px;
  }
  .overlay p { margin: 4px 0; font-size: 14px; opacity: .85; line-height: 1.5; }
  .btn {
    margin-top: 16px; cursor: pointer;
    background: linear-gradient(135deg, var(--neon), #00b4ff);
    color: #04141a; font-weight: 700; letter-spacing: 1px;
    border: none; border-radius: 10px;
    padding: 12px 28px; font-size: 16px;
    box-shadow: 0 0 18px rgba(0,255,213,.5);
    transition: transform .08s ease;
  }
  .btn:active { transform: scale(.95); }
  .hint { margin-top: 14px; font-size: 12px; opacity: .55; line-height: 1.6; }
  /* mobil yön tuşları */
  .dpad {
    margin-top: 16px;
    display: none;
    grid-template-columns: repeat(3, 58px);
    grid-template-rows: repeat(2, 58px);
    gap: 8px;
    justify-content: center;
  }
  .dpad button {
    background: rgba(0,255,213,.08);
    border: 1.5px solid rgba(0,255,213,.4);
    border-radius: 12px;
    color: var(--neon);
    font-size: 24px;
    box-shadow: 0 0 10px rgba(0,255,213,.2);
  }
  .dpad button:active { background: rgba(0,255,213,.25); }
  .dpad .up   { grid-column: 2; grid-row: 1; }
  .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .down { grid-column: 2; grid-row: 2; }
  .dpad .right{ grid-column: 3; grid-row: 2; }
  @media (hover: none) and (pointer: coarse) { .dpad { display: grid; } }
</style>
</head>
<body>
  <h1>NEON YILAN</h1>
  <div class="scorebar">
    <span><span id="scoreLabel">Skor:</span> <b id="score">0</b></span>
    <span class="hi"><span id="hiLabel">Rekor:</span> <b id="hi">0</b></span>
    <button id="soundBtn" class="soundbtn" title="Ses aç/kapat" aria-label="Ses">🔊</button>
  </div>

  <div class="wrap">
    <canvas id="game" width="420" height="420"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="ovTitle">Neon Yılan</h2>
      <p id="ovText">Yemleri topla, uzadıkça hızlan.<br>Duvara ya da kendine çarpma!</p>
      <button class="btn" id="startBtn">BAŞLA</button>
      <div class="hint">
        Klavye: Ok tuşları / WASD &nbsp;•&nbsp; Boşluk: duraklat &nbsp;•&nbsp; Enter: yeniden<br>
        Mobil: ekranda kaydır veya yön tuşları
      </div>
    </div>
  </div>

  <div class="dpad" id="dpad">
    <button class="up"    data-dir="up">▲</button>
    <button class="left"  data-dir="left">◀</button>
    <button class="down"  data-dir="down">▼</button>
    <button class="right" data-dir="right">▶</button>
  </div>

<script>
(function () {
  "use strict";

  /* ---------- DİL / I18N ---------- */
  const I18N = {
    tr: {
      brand: "Neon Yılan",
      scoreLabel: "Skor:",
      hiLabel: "Rekor:",
      soundTitle: "Ses aç/kapat",
      soundAria: "Ses",
      ovStartText: "Yemleri topla, uzadıkça hızlan.<br>Duvara ya da kendine çarpma!",
      btnStart: "BAŞLA",
      hint: 'Klavye: Ok tuşları / WASD &nbsp;•&nbsp; Boşluk: duraklat &nbsp;•&nbsp; Enter: yeniden<br>Mobil: ekranda kaydır veya yön tuşları',
      gameOver: "Oyun Bitti",
      btnRestart: "TEKRAR OYNA",
      paused: "Duraklatıldı",
      pausedText: "Devam etmek için Boşluk'a bas veya BAŞLA'ya dokun.",
      btnContinue: "DEVAM",
      yourScore: "Skorun:",
      recordInline: "Rekor:"
    },
    en: {
      brand: "Neon Snake",
      scoreLabel: "Score:",
      hiLabel: "Best:",
      soundTitle: "Toggle sound",
      soundAria: "Sound",
      ovStartText: "Collect the food and speed up as you grow.<br>Don't hit the walls or yourself!",
      btnStart: "START",
      hint: 'Keyboard: Arrow keys / WASD &nbsp;•&nbsp; Space: pause &nbsp;•&nbsp; Enter: restart<br>Mobile: swipe on screen or use the arrow buttons',
      gameOver: "Game Over",
      btnRestart: "PLAY AGAIN",
      paused: "Paused",
      pausedText: "Press Space or tap START to continue.",
      btnContinue: "CONTINUE",
      yourScore: "Your score:",
      recordInline: "Best:"
    }
  };
  function tx(k) {
    return (I18N[LANG] && I18N[LANG][k] != null) ? I18N[LANG][k] : I18N.tr[k];
  }
  function detectLang() {
    try {
      var s = JSON.parse(localStorage.getItem('portfolioos.v1') || 'null');
      if (s && (s.lang === 'tr' || s.lang === 'en')) return s.lang;
    } catch (e) {}
    var n = (navigator.language || 'tr').toLowerCase();
    return n.indexOf('en') === 0 ? 'en' : 'tr';
  }
  var LANG = detectLang();

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const hiEl = document.getElementById("hi");
  const overlay = document.getElementById("overlay");
  const ovTitle = document.getElementById("ovTitle");
  const ovText = document.getElementById("ovText");
  const startBtn = document.getElementById("startBtn");
  const soundBtn = document.getElementById("soundBtn");
  const titleH1 = document.querySelector("h1");
  const scoreLabelEl = document.getElementById("scoreLabel");
  const hiLabelEl = document.getElementById("hiLabel");
  const hintEl = document.querySelector(".hint");

  /* ---------- SES (Web Audio, harici dosya yok) ---------- */
  const Sound = (function () {
    let ctxA = null;
    let muted = localStorage.getItem("neonSnakeMuted") === "1";

    function ensure() {
      if (!ctxA) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        ctxA = new AC();
      }
      if (ctxA.state === "suspended") ctxA.resume();
      return ctxA;
    }

    // tek bir ton çal
    function tone(freq, dur, type, vol, when) {
      const a = ensure();
      if (!a || muted) return;
      const t0 = a.currentTime + (when || 0);
      const osc = a.createOscillator();
      const gain = a.createGain();
      osc.type = type || "square";
      osc.frequency.setValueAtTime(freq, t0);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(vol || 0.18, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain).connect(a.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    }

    // frekansı kaydıran ton (slide)
    function slide(f1, f2, dur, type, vol) {
      const a = ensure();
      if (!a || muted) return;
      const t0 = a.currentTime;
      const osc = a.createOscillator();
      const gain = a.createGain();
      osc.type = type || "sawtooth";
      osc.frequency.setValueAtTime(f1, t0);
      osc.frequency.exponentialRampToValueAtTime(Math.max(1, f2), t0 + dur);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(vol || 0.16, t0 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain).connect(a.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    }

    return {
      eat()   { tone(660, 0.08, "square", 0.16); tone(990, 0.09, "square", 0.13, 0.06); },
      turn()  { tone(280, 0.035, "triangle", 0.06); },
      start() { tone(523, 0.09, "triangle", 0.16); tone(784, 0.12, "triangle", 0.16, 0.09); },
      over()  { slide(440, 90, 0.55, "sawtooth", 0.2); },
      pause() { tone(330, 0.07, "sine", 0.12); },
      isMuted() { return muted; },
      toggle() {
        muted = !muted;
        localStorage.setItem("neonSnakeMuted", muted ? "1" : "0");
        if (!muted) { ensure(); tone(700, 0.07, "triangle", 0.14); }
        return muted;
      },
      warm() { ensure(); } // ilk kullanıcı etkileşiminde ses motorunu uyandır
    };
  })();

  function syncSoundBtn() {
    const m = Sound.isMuted();
    soundBtn.textContent = m ? "🔇" : "🔊";
    soundBtn.classList.toggle("muted", m);
  }
  soundBtn.addEventListener("click", () => { Sound.toggle(); syncSoundBtn(); });
  syncSoundBtn();

  const GRID = 21;            // hücre sayısı (kare)
  let cell = canvas.width / GRID;

  // duyarlı tuval boyutu (kare, ekranı aşmadan)
  function resize() {
    const max = Math.min(window.innerWidth - 24, window.innerHeight - 230, 520);
    const size = Math.max(260, Math.floor(max / GRID) * GRID);
    canvas.width = size;
    canvas.height = size;
    cell = size / GRID;
    draw();
  }

  let snake, dir, nextDir, food, score, hi, speed, timer, running, paused, dead;
  let overlayState = "start"; // "start" | "over" | "paused"

  // başlangıç ekranı metinlerini (overlay) güncelle
  function renderOverlay() {
    if (overlayState === "over") {
      ovTitle.textContent = tx("gameOver");
      ovText.innerHTML = `${tx("yourScore")} <b style="color:#ff2e88">${score}</b><br>${tx("recordInline")} <b style="color:#ffe600">${hi}</b>`;
      startBtn.textContent = tx("btnRestart");
    } else if (overlayState === "paused") {
      ovTitle.textContent = tx("paused");
      ovText.textContent = tx("pausedText");
      startBtn.textContent = tx("btnContinue");
    } else {
      ovTitle.textContent = tx("brand");
      ovText.innerHTML = tx("ovStartText");
      startBtn.textContent = tx("btnStart");
    }
  }

  // tüm sabit DOM metinlerini diline göre uygula
  function applyTexts() {
    document.documentElement.lang = LANG;
    if (titleH1) titleH1.textContent = tx("brand").toUpperCase();
    document.title = tx("brand");
    if (scoreLabelEl) scoreLabelEl.textContent = tx("scoreLabel");
    if (hiLabelEl) hiLabelEl.textContent = tx("hiLabel");
    if (soundBtn) { soundBtn.title = tx("soundTitle"); soundBtn.setAttribute("aria-label", tx("soundAria")); }
    if (hintEl) hintEl.innerHTML = tx("hint");
    renderOverlay();
  }

  hi = parseInt(localStorage.getItem("neonSnakeHi") || "0", 10);
  hiEl.textContent = hi;

  function reset() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = 140;             // ms / adım (düşük = hızlı)
    dead = false;
    paused = false;
    placeFood();
    scoreEl.textContent = "0";
  }

  function placeFood() {
    let p;
    do {
      p = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 };
    } while (snake.some(s => s.x === p.x && s.y === p.y));
    food = p;
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // duvar veya kendine çarpma
    if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      Sound.eat();
      placeFood();
      // her yemde hızlan (alt sınır 65ms)
      if (speed > 65) { speed -= 4; restartTimer(); }
    } else {
      snake.pop();
    }
    draw();
  }

  function restartTimer() {
    clearInterval(timer);
    timer = setInterval(step, speed);
  }

  function draw() {
    // arka plan + ızgara
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(0,255,213,0.05)";
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath(); ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * cell); ctx.lineTo(canvas.width, i * cell); ctx.stroke();
    }

    if (!food) return;

    // yem (parlak)
    const fx = food.x * cell + cell / 2, fy = food.y * cell + cell / 2;
    ctx.shadowBlur = 18; ctx.shadowColor = "#ffe600";
    ctx.fillStyle = "#ffe600";
    ctx.beginPath(); ctx.arc(fx, fy, cell * 0.32, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // yılan
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const t = i / snake.length;
      const head = i === 0;
      const pad = head ? 1 : 2;
      ctx.shadowBlur = head ? 20 : 10;
      ctx.shadowColor = head ? "#00ffd5" : "#ff2e88";
      // baştan kuyruğa renk geçişi
      ctx.fillStyle = head
        ? "#00ffd5"
        : `rgba(${Math.round(0 + t * 255)}, ${Math.round(255 - t * 209)}, ${Math.round(213 - t * 77)}, 0.95)`;
      roundRect(s.x * cell + pad, s.y * cell + pad, cell - pad * 2, cell - pad * 2, 5);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function gameOver() {
    dead = true;
    running = false;
    clearInterval(timer);
    Sound.over();
    if (score > hi) {
      hi = score;
      localStorage.setItem("neonSnakeHi", String(hi));
      hiEl.textContent = hi;
    }
    overlayState = "over";
    renderOverlay();
    overlay.classList.remove("hidden");
  }

  function start() {
    reset();
    running = true;
    overlay.classList.add("hidden");
    Sound.warm();
    Sound.start();
    draw();
    restartTimer();
  }

  function togglePause() {
    if (!running || dead) return;
    paused = !paused;
    Sound.pause();
    if (paused) {
      clearInterval(timer);
      overlayState = "paused";
      renderOverlay();
      overlay.classList.remove("hidden");
    } else {
      overlay.classList.add("hidden");
      restartTimer();
    }
  }

  // yön değiştir (geri dönüşü engelle)
  function setDir(nx, ny) {
    if (!running || paused) return;
    if (nx === -dir.x && ny === -dir.y) return; // ters yöne dönülmez
    if (nx !== nextDir.x || ny !== nextDir.y) Sound.turn();
    nextDir = { x: nx, y: ny };
  }

  const DIRS = {
    up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0]
  };

  // klavye
  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (["arrowup", "w"].includes(k)) { setDir(0, -1); e.preventDefault(); }
    else if (["arrowdown", "s"].includes(k)) { setDir(0, 1); e.preventDefault(); }
    else if (["arrowleft", "a"].includes(k)) { setDir(-1, 0); e.preventDefault(); }
    else if (["arrowright", "d"].includes(k)) { setDir(1, 0); e.preventDefault(); }
    else if (k === " ") { togglePause(); e.preventDefault(); }
    else if (k === "enter") { if (!running) start(); }
  });

  // mobil yön tuşları
  document.getElementById("dpad").addEventListener("click", (e) => {
    const b = e.target.closest("button");
    if (!b) return;
    const d = DIRS[b.dataset.dir];
    if (d) setDir(d[0], d[1]);
  });

  // dokunmatik kaydırma (swipe)
  let tsx = 0, tsy = 0;
  canvas.addEventListener("touchstart", (e) => {
    const t = e.touches[0]; tsx = t.clientX; tsy = t.clientY;
  }, { passive: true });
  canvas.addEventListener("touchend", (e) => {
    const t = e.changedTouches[0];
    const dx = t.clientX - tsx, dy = t.clientY - tsy;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
  }, { passive: true });

  startBtn.addEventListener("click", () => {
    if (paused) { togglePause(); } else { start(); }
  });

  // üst sayfadan dil değişikliği bildirimi
  window.addEventListener("message", function (e) {
    var d = e && e.data;
    if (d && d.type === "setLang" && (d.lang === "tr" || d.lang === "en")) {
      LANG = d.lang;
      applyTexts();
    }
  });

  applyTexts();
  window.addEventListener("resize", resize);
  resize();
  draw();
})();
</script>
</body>
</html>
