<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Road Fighter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0d12; color: #fff;
    font-family: "Rajdhani", "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    user-select: none;
  }
  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 18px; font-weight: 700; letter-spacing: 2px; }
  .topbar .ttl { color: #ff4d4d; text-shadow: 0 0 12px rgba(255,77,77,.5); }
  .soundbtn { background: #15181f; border: 1px solid #333; border-radius: 8px; cursor: pointer; font-size: 15px; line-height: 1; padding: 6px 10px; color: #fff; }
  .soundbtn:active { transform: scale(.9); }
  .soundbtn.muted { opacity: .5; }
  .wrap { position: relative; line-height: 0; }
  canvas {
    display: block;
    background: #2b2d31; border-radius: 10px;
    box-shadow: 0 18px 50px rgba(0,0,0,.6);
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(6,9,14,.8); border-radius: 10px; text-align: center; padding: 22px; line-height: 1.5;
    backdrop-filter: blur(3px);
  }
  .overlay.hidden { display: none; }
  .overlay h2 { margin: 0 0 8px; font-size: 30px; letter-spacing: 2px; color: #ffd23e; text-shadow: 0 0 16px rgba(255,210,62,.5); }
  .overlay p { margin: 4px 0; font-size: 15px; opacity: .9; line-height: 1.7; }
  .btn {
    margin-top: 18px; cursor: pointer; font-family: inherit; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(135deg, #ff5a3c, #ffb000); color: #2a1400;
    border: none; border-radius: 10px; padding: 13px 32px; font-size: 18px;
    box-shadow: 0 6px 18px rgba(255,120,0,.4); transition: transform .07s ease;
  }
  .btn:active { transform: translateY(2px); }
  .hint { margin-top: 16px; font-size: 12px; opacity: .55; line-height: 1.8; }
  .controls { margin-top: 14px; display: none; align-items: center; gap: 14px; justify-content: center; }
  .controls button { width: 66px; height: 66px; border-radius: 14px; background: #181b22; border: 1px solid #333; color: #fff; font-family: inherit; font-weight: 700; font-size: 22px; touch-action: none; }
  .controls button:active { background: #2a2f3a; }
  .controls .gas { color: #6fe08a; border-color: #2e6b3e; font-size: 13px; }
  .controls .brake { color: #ff6b6b; border-color: #6b2e2e; font-size: 13px; }
  @media (hover: none) and (pointer: coarse) { .controls { display: flex; } }
</style>
</head>
<body>
  <div class="topbar">
    <span class="ttl">ROAD FIGHTER</span>
    <button id="soundBtn" class="soundbtn" title="Ses" aria-label="Ses">♪</button>
  </div>

  <div class="wrap">
    <canvas id="game" width="512" height="480"></canvas>
    <div class="overlay" id="overlay">
      <h2>ROAD FIGHTER</h2>
      <p id="ovText">Trafikten sıyrıl, yola çık!<br>Araçlara ve yol kenarına çarpma.<br>Yeşil araçlar yakıt verir.</p>
      <button class="btn" id="startBtn">BAŞLA</button>
      <div class="hint">
        Klavye: ◀ ▶ direksiyon &nbsp;·&nbsp; ▲ gaz &nbsp;·&nbsp; ▼ fren<br>
        Mobil: arabayı parmağınla sürükle ya da tuşlar
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="brake" id="cBrake">FREN</button>
    <button id="cLeft">◀</button>
    <button id="cRight">▶</button>
    <button class="gas" id="cGas">GAZ</button>
  </div>

<script>
(function () {
  "use strict";

  const VW = 512, VH = 480;
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const overlay = document.getElementById("overlay");
  const ovText = document.getElementById("ovText");
  const startBtn = document.getElementById("startBtn");
  const soundBtn = document.getElementById("soundBtn");

  // ---- yerlesim ----
  const RAIL_X = 12, RAIL_W = 22;
  const ROAD_X = 100, ROAD_W = 192, GRASS_R = ROAD_X + ROAD_W; // 100..292
  const HUD_X = 368, ROAD_CX = ROAD_X + ROAD_W / 2;            // 196

  /* ===== yardimcilar ===== */
  function rr(g, x, y, w, h, r) {
    g.beginPath();
    g.moveTo(x + r, y);
    g.arcTo(x + w, y, x + w, y + h, r);
    g.arcTo(x + w, y + h, x, y + h, r);
    g.arcTo(x, y + h, x, y, r);
    g.arcTo(x, y, x + w, y, r);
    g.closePath();
  }
  function shade(hex, amt) {
    let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    if (amt >= 0) { r += (255 - r) * amt; g += (255 - g) * amt; b += (255 - b) * amt; }
    else { r *= (1 + amt); g *= (1 + amt); b *= (1 + amt); }
    return "rgb(" + (r | 0) + "," + (g | 0) + "," + (b | 0) + ")";
  }
  function mkCanvas(w, h) { const c = document.createElement("canvas"); c.width = w; c.height = h; return c; }

  /* ===== dokular ===== */
  function makeAsphalt(w, h) {
    const c = mkCanvas(w, h), g = c.getContext("2d");
    g.fillStyle = "#4d4f53"; g.fillRect(0, 0, w, h);
    const img = g.getImageData(0, 0, w, h), d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const n = (Math.random() * 38 - 19) | 0;
      d[i] += n; d[i + 1] += n; d[i + 2] += n;
    }
    g.putImageData(img, 0, 0);
    return c;
  }
  function makeGrass(w, h) {
    const c = mkCanvas(w, h), g = c.getContext("2d");
    const grd = g.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, "#3f8f2a"); grd.addColorStop(1, "#379025");
    g.fillStyle = grd; g.fillRect(0, 0, w, h);
    for (let i = 0; i < w * h * 0.10; i++) {
      g.fillStyle = Math.random() < 0.5 ? "rgba(95,175,65,0.45)" : "rgba(38,105,28,0.45)";
      g.fillRect(Math.random() * w, Math.random() * h, 1, 2);
    }
    return c;
  }

  /* ===== gercekci araba (offscreen) ===== */
  function carInto(g, cx, cy, w, h, col) {
    g.save(); g.globalAlpha = 0.32; g.fillStyle = "#000";
    rr(g, cx - w / 2 + 3, cy - h / 2 + 5, w, h, w * 0.32); g.fill();
    g.restore();
    g.fillStyle = "#15161a";
    const tw = w * 0.17, th = h * 0.2;
    for (const s of [[-1, -1], [1, -1], [-1, 1], [1, 1]]) {
      rr(g, cx + s[0] * (w / 2 - tw * 0.35) - tw / 2, cy + s[1] * (h * 0.3) - th / 2, tw, th, 2); g.fill();
    }
    const body = g.createLinearGradient(cx - w / 2, 0, cx + w / 2, 0);
    body.addColorStop(0, shade(col, -0.45)); body.addColorStop(0.18, shade(col, -0.1));
    body.addColorStop(0.5, shade(col, 0.25)); body.addColorStop(0.82, shade(col, -0.1));
    body.addColorStop(1, shade(col, -0.45));
    g.fillStyle = body; rr(g, cx - w / 2, cy - h / 2, w, h, w * 0.3); g.fill();
    const vlong = g.createLinearGradient(0, cy - h / 2, 0, cy + h / 2);
    vlong.addColorStop(0, "rgba(255,255,255,0.16)"); vlong.addColorStop(0.12, "rgba(255,255,255,0)");
    vlong.addColorStop(0.88, "rgba(0,0,0,0)"); vlong.addColorStop(1, "rgba(0,0,0,0.25)");
    g.fillStyle = vlong; rr(g, cx - w / 2, cy - h / 2, w, h, w * 0.3); g.fill();
    const wsW = w * 0.62, wsH = h * 0.2;
    let gr = g.createLinearGradient(0, cy - h * 0.34, 0, cy - h * 0.14);
    gr.addColorStop(0, "#1a2a3a"); gr.addColorStop(1, "#4a6f95");
    g.fillStyle = gr; rr(g, cx - wsW / 2, cy - h * 0.34, wsW, wsH, 3); g.fill();
    gr = g.createLinearGradient(0, cy + h * 0.14, 0, cy + h * 0.34);
    gr.addColorStop(0, "#3a5575"); gr.addColorStop(1, "#16242f");
    g.fillStyle = gr; rr(g, cx - wsW / 2, cy + h * 0.14, wsW, wsH, 3); g.fill();
    const roof = g.createLinearGradient(cx - w * 0.3, 0, cx + w * 0.3, 0);
    roof.addColorStop(0, shade(col, -0.2)); roof.addColorStop(0.5, shade(col, 0.4)); roof.addColorStop(1, shade(col, -0.2));
    g.fillStyle = roof; rr(g, cx - w * 0.28, cy - h * 0.1, w * 0.56, h * 0.22, 3); g.fill();
    g.strokeStyle = "rgba(255,255,255,0.3)"; g.lineWidth = 1.5;
    g.beginPath(); g.moveTo(cx - w * 0.22, cy - h * 0.4); g.lineTo(cx - w * 0.22, cy + h * 0.4); g.stroke();
    g.fillStyle = "#fff7d0";
    rr(g, cx - w * 0.4, cy - h / 2 + 1, w * 0.16, h * 0.06, 1); g.fill();
    rr(g, cx + w * 0.24, cy - h / 2 + 1, w * 0.16, h * 0.06, 1); g.fill();
    g.fillStyle = "#cc1414";
    rr(g, cx - w * 0.4, cy + h / 2 - h * 0.06 - 1, w * 0.16, h * 0.06, 1); g.fill();
    rr(g, cx + w * 0.24, cy + h / 2 - h * 0.06 - 1, w * 0.16, h * 0.06, 1); g.fill();
  }
  function makeCar(w, h, col) {
    const pad = 12, c = mkCanvas(w + pad * 2, h + pad * 2), g = c.getContext("2d");
    carInto(g, c.width / 2, c.height / 2, w, h, col);
    return c;
  }

  /* ===== gercekci agac (offscreen, golgeli) ===== */
  function makeTree(R, dark) {
    const pad = R * 0.6, c = mkCanvas(R * 2 + pad * 2, R * 2 + pad * 2), g = c.getContext("2d");
    const cx = c.width / 2 - R * 0.2, cy = c.height / 2 - R * 0.1;
    g.save(); g.globalAlpha = 0.28; g.fillStyle = "#11320f";
    g.beginPath(); g.ellipse(cx + R * 0.4, cy + R * 0.45, R * 1.05, R * 0.9, 0, 0, Math.PI * 2); g.fill();
    g.restore();
    const lobes = [[0, 0, 1], [-0.5, -0.3, 0.62], [0.5, -0.25, 0.6], [-0.35, 0.45, 0.58], [0.4, 0.4, 0.6], [0, -0.55, 0.58]];
    const c0 = dark ? "#54b034" : "#5fbf3a", c1 = dark ? "#268020" : "#2f8f24", c2 = dark ? "#124d10" : "#175c13";
    for (const L of lobes) {
      const x = cx + L[0] * R, y = cy + L[1] * R, rad = R * L[2];
      const grd = g.createRadialGradient(x - rad * 0.3, y - rad * 0.3, rad * 0.2, x, y, rad);
      grd.addColorStop(0, c0); grd.addColorStop(0.6, c1); grd.addColorStop(1, c2);
      g.fillStyle = grd; g.beginPath(); g.arc(x, y, rad, 0, Math.PI * 2); g.fill();
    }
    g.fillStyle = "rgba(150,220,110,0.45)";
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2, rad = Math.random() * R * 0.7;
      g.beginPath(); g.arc(cx - R * 0.2 + Math.cos(a) * rad, cy - R * 0.2 + Math.sin(a) * rad, R * 0.09, 0, Math.PI * 2); g.fill();
    }
    return { c: c, ox: c.width / 2, oy: c.height / 2 };
  }

  let TILE_ASPH, TILE_GRASS, SPR = {}, TREES = [];
  function buildAssets() {
    TILE_ASPH = makeAsphalt(ROAD_W, 256);
    TILE_GRASS = makeGrass(256, 256);
    SPR.player = makeCar(32, 56, "#d11a1a");
    SPR.yellow = makeCar(30, 52, "#e6b400");
    SPR.blue   = makeCar(30, 52, "#2a64d8");
    SPR.white  = makeCar(30, 52, "#dcdcd0");
    SPR.fuel   = makeCar(30, 52, "#1f9e34");
    TREES = [makeTree(26, false), makeTree(24, true), makeTree(29, false)];
  }
  function blit(spr, cx, cy) { ctx.drawImage(spr, Math.round(cx - spr.width / 2), Math.round(cy - spr.height / 2)); }
  function blitTree(t, cx, cy) { ctx.drawImage(t.c, Math.round(cx - t.ox), Math.round(cy - t.oy)); }

  /* ---------- SES ---------- */
  const Sound = (function () {
    let actx = null, engOsc = null, engGain = null, engOn = false;
    let muted = localStorage.getItem("roadMuted") === "1";
    function ensure() {
      if (!actx) { const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return null; actx = new AC(); }
      if (actx.state === "suspended") actx.resume();
      return actx;
    }
    function blip(freq, dur, type, vol, when) {
      const a = ensure(); if (!a || muted) return;
      const t0 = a.currentTime + (when || 0);
      const o = a.createOscillator(), g = a.createGain();
      o.type = type || "square"; o.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol || 0.16, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g).connect(a.destination); o.start(t0); o.stop(t0 + dur + 0.02);
    }
    function engineStart() {
      const a = ensure(); if (!a || engOn) return;
      engOsc = a.createOscillator(); engGain = a.createGain();
      engOsc.type = "sawtooth"; engOsc.frequency.value = 70;
      engGain.gain.value = muted ? 0 : 0.05;
      engOsc.connect(engGain).connect(a.destination);
      engOsc.start(); engOn = true;
    }
    function engineStop() {
      if (engOsc) { try { engOsc.stop(); } catch (e) {} try { engOsc.disconnect(); } catch (e) {} }
      engOsc = null; engGain = null; engOn = false;
    }
    function engineSpeed(p) {
      if (engGain && engOsc && actx) {
        engOsc.frequency.setTargetAtTime(60 + p * 130, actx.currentTime, 0.05);
        engGain.gain.setTargetAtTime(muted ? 0 : 0.04 + p * 0.05, actx.currentTime, 0.05);
      }
    }
    return {
      pass()  { blip(880, 0.07, "square", 0.13); },
      fuel()  { blip(660, 0.08, "triangle", 0.16); blip(990, 0.1, "triangle", 0.14, 0.07); },
      warn()  { blip(330, 0.12, "square", 0.12); },
      crash() {
        const a = ensure(); if (!a || muted) { engineStop(); return; }
        engineStop();
        const o = a.createOscillator(), g = a.createGain();
        o.type = "sawtooth"; o.frequency.setValueAtTime(300, a.currentTime);
        o.frequency.exponentialRampToValueAtTime(40, a.currentTime + 0.5);
        g.gain.setValueAtTime(0.3, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.55);
        o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime + 0.6);
      },
      go() { blip(523, 0.1, "triangle", 0.16); blip(784, 0.12, "triangle", 0.16, 0.1); },
      engineStart, engineStop, engineSpeed,
      isMuted() { return muted; }, warm() { ensure(); },
      toggle() {
        muted = !muted; localStorage.setItem("roadMuted", muted ? "1" : "0");
        if (engGain) engGain.gain.value = muted ? 0 : 0.06;
        if (!muted) { ensure(); blip(700, 0.07, "triangle", 0.14); }
        return muted;
      }
    };
  })();
  function syncSoundBtn() { soundBtn.textContent = Sound.isMuted() ? "🔇" : "♪"; soundBtn.classList.toggle("muted", Sound.isMuted()); }
  soundBtn.addEventListener("click", () => { Sound.toggle(); syncSoundBtn(); });
  syncSoundBtn();

  /* ---------- OLCEKLEME ---------- */
  function resize() {
    const maxW = Math.min(window.innerWidth - 20, 560);
    const maxH = window.innerHeight - 220;
    let scale = Math.min(maxW / VW, maxH / VH);
    if (!isFinite(scale) || scale <= 0) scale = 1;
    canvas.style.width = Math.round(VW * scale) + "px";
    canvas.style.height = Math.round(VH * scale) + "px";
    ctx.imageSmoothingEnabled = true;
    draw();
  }

  /* ---------- DURUM ---------- */
  let player, enemies, scenery, speed, dist, score, hi, fuel, running, dead, raf, lastT, scrollY, spawnT, scenT, warnT;
  let steerLeft = false, steerRight = false, gas = false, brake = false, dragX = null;

  const SPD_MIN = 260, SPD_MAX = 640;
  hi = parseInt(localStorage.getItem("roadHi") || "0", 10);

  const LANES = [ROAD_X + 30, ROAD_X + 78, ROAD_X + 120, ROAD_X + 162];

  function reset() {
    player = { x: ROAD_CX, y: VH - 70, w: 32, h: 56 };
    enemies = []; scenery = [];
    speed = SPD_MIN; dist = 0; score = 0; fuel = 99;
    scrollY = 0; spawnT = 0; scenT = 0; warnT = 0;
    dead = false;
    for (let y = -30; y < VH; y += 70) addScenery(y);
    clampPlayer();
  }
  function clampPlayer() {
    const mn = ROAD_X + player.w / 2 + 6, mx = GRASS_R - player.w / 2 - 6;
    if (player.x < mn) player.x = mn;
    if (player.x > mx) player.x = mx;
  }
  function addScenery(y) {
    const tiL = (Math.random() * TREES.length) | 0, tiR = (Math.random() * TREES.length) | 0;
    if (Math.random() < 0.85) scenery.push({ x: RAIL_X + RAIL_W + 18 + Math.random() * (ROAD_X - (RAIL_X + RAIL_W) - 44), y: y, t: tiL });
    if (Math.random() < 0.85) scenery.push({ x: GRASS_R + 24 + Math.random() * (HUD_X - GRASS_R - 50), y: y + 35, t: tiR });
  }
  function spawnEnemy() {
    const lane = (Math.random() * LANES.length) | 0;
    const x = LANES[lane], w = 30, h = 52;
    for (const e of enemies) if (e.y < h * 1.8 && Math.abs(e.x - x) < w + 4) return;
    const isFuel = Math.random() < 0.15;
    let sp = "yellow";
    if (!isFuel) { const r = Math.random(); sp = r < 0.55 ? "yellow" : (r < 0.8 ? "white" : "blue"); }
    enemies.push({ x, y: -h, w, h, spr: isFuel ? "fuel" : sp, vy: speed * (0.3 + Math.random() * 0.3), fuel: isFuel, passed: false });
  }
  function kmh() { return Math.round((speed - SPD_MIN) / (SPD_MAX - SPD_MIN) * 380) + 20; }

  function update(dt) {
    if (gas) speed += 440 * dt;
    else if (brake) speed -= 640 * dt;
    else speed += 28 * dt;
    if (speed > SPD_MAX) speed = SPD_MAX;
    if (speed < SPD_MIN) speed = SPD_MIN;

    const sv = 300 * dt;
    if (dragX != null) { player.x += Math.max(-sv * 2.4, Math.min(sv * 2.4, dragX - player.x)); }
    else { if (steerLeft) player.x -= sv; if (steerRight) player.x += sv; }
    const mn = ROAD_X + player.w / 2, mx = GRASS_R - player.w / 2;
    if (player.x < mn - 2 || player.x > mx + 2) return gameOver("kenar");
    clampPlayer();

    dist += speed * dt; score = Math.floor(dist / 6); scrollY += speed * dt;
    Sound.engineSpeed((speed - SPD_MIN) / (SPD_MAX - SPD_MIN));

    fuel -= dt * (1.4 + speed / SPD_MAX);
    if (fuel <= 0) { fuel = 0; return gameOver("yakit"); }
    if (fuel < 15) { warnT -= dt; if (warnT <= 0) { Sound.warn(); warnT = 0.6; } }

    scenT -= speed * dt;
    if (scenT <= 0) { addScenery(-40); scenT = 70; }
    for (let i = scenery.length - 1; i >= 0; i--) { scenery[i].y += speed * dt; if (scenery[i].y > VH + 50) scenery.splice(i, 1); }

    spawnT -= dt;
    const interval = Math.max(0.45, 1.2 - speed / 1000);
    if (spawnT <= 0) { spawnEnemy(); spawnT = interval; }
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.y += (speed - e.vy) * dt;
      if (Math.abs(e.x - player.x) < (e.w + player.w) / 2 - 10 &&
          Math.abs(e.y - player.y) < (e.h + player.h) / 2 - 12) {
        if (e.fuel) { fuel = Math.min(99, fuel + 35); Sound.fuel(); enemies.splice(i, 1); continue; }
        return gameOver("carpma");
      }
      if (!e.passed && e.y > player.y + player.h) { e.passed = true; if (!e.fuel) { score += 10; Sound.pass(); } }
      if (e.y > VH + e.h) enemies.splice(i, 1);
    }
    draw();
  }

  /* ---------- CIZIM ---------- */
  function py(v) { return Math.round(v); }

  function draw() {
    // cim
    for (let x = 0; x < HUD_X; x += 256) for (let y = 0; y < VH; y += 256) ctx.drawImage(TILE_GRASS, x, y);

    // sol korkuluk (metal)
    ctx.fillStyle = "#8a8d92"; ctx.fillRect(RAIL_X, 0, RAIL_W, VH);
    ctx.fillStyle = "#c7cace"; ctx.fillRect(RAIL_X + 2, 0, 4, VH);
    ctx.fillStyle = "#5a5d62"; ctx.fillRect(RAIL_X + RAIL_W - 5, 0, 4, VH);
    ctx.fillStyle = "rgba(0,0,0,.25)";
    const ps = 26, po = scrollY % ps;
    for (let y = -po; y < VH; y += ps) ctx.fillRect(RAIL_X + RAIL_W / 2 - 1, py(y), 3, 12);

    // asfalt (kayan)
    const ah = TILE_ASPH.height;
    for (let y = -(scrollY % ah); y < VH; y += ah) ctx.drawImage(TILE_ASPH, ROAD_X, py(y));
    // kenar koyu gradyan
    let eg = ctx.createLinearGradient(ROAD_X, 0, ROAD_X + 24, 0);
    eg.addColorStop(0, "rgba(0,0,0,0.45)"); eg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = eg; ctx.fillRect(ROAD_X, 0, 24, VH);
    eg = ctx.createLinearGradient(GRASS_R - 24, 0, GRASS_R, 0);
    eg.addColorStop(0, "rgba(0,0,0,0)"); eg.addColorStop(1, "rgba(0,0,0,0.45)");
    ctx.fillStyle = eg; ctx.fillRect(GRASS_R - 24, 0, 24, VH);
    // lastik izleri
    ctx.fillStyle = "rgba(18,18,20,0.16)";
    ctx.fillRect(ROAD_CX - 58, 0, 26, VH); ctx.fillRect(ROAD_CX + 32, 0, 26, VH);
    // kenar cizgileri
    ctx.fillStyle = "rgba(228,228,212,0.85)";
    ctx.fillRect(ROAD_X + 6, 0, 5, VH); ctx.fillRect(GRASS_R - 11, 0, 5, VH);
    // orta kesik cizgi
    ctx.fillStyle = "rgba(242,236,205,0.92)";
    const dl = 34, dg = 30, o2 = scrollY % (dl + dg);
    for (let y = -dl + o2; y < VH; y += dl + dg) { rr(ctx, ROAD_CX - 4, py(y), 8, dl, 3); ctx.fill(); }

    // agaclar + araclar
    if (scenery) for (const s of scenery) blitTree(TREES[s.t] || TREES[0], s.x, s.y);
    if (enemies) for (const e of enemies) blit((SPR[e.spr] || SPR.yellow), e.x, e.y);
    if (player) blit(SPR.player, player.x, player.y);

    drawHUD();
  }

  function txt(s, x, y, size, color, align, weight) {
    ctx.fillStyle = color || "#fff";
    ctx.font = (weight || 700) + " " + size + 'px "Rajdhani", system-ui, sans-serif';
    ctx.textBaseline = "top"; ctx.textAlign = align || "left";
    ctx.fillText(s, x, y);
  }
  function pad(n, len) { n = String(Math.max(0, Math.floor(n))); while (n.length < len) n = "0" + n; return n; }

  function drawHUD() {
    ctx.fillStyle = "#0a0a0c"; ctx.fillRect(HUD_X, 0, VW - HUD_X, VH);
    // hafif dik gradyan panel
    const pg = ctx.createLinearGradient(HUD_X, 0, VW, 0);
    pg.addColorStop(0, "rgba(255,255,255,0.05)"); pg.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = pg; ctx.fillRect(HUD_X, 0, VW - HUD_X, VH);
    const cx0 = HUD_X + 16;
    txt("1P", cx0, 22, 22, "#fff");
    txt(pad(score, 6), cx0, 48, 26, "#ffd23e");
    txt(pad(kmh(), 3), cx0, 132, 34, "#fff");
    txt("km/h", cx0 + 2, 170, 16, "#9aa");
    txt("TOP", cx0, 216, 16, "#6fe08a");
    txt(pad(hi, 6), cx0, 236, 20, "#6fe08a");
    const fy = 300, lowf = fuel < 15;
    txt("FUEL", cx0, fy, 18, lowf ? "#27e0e0" : "#ff5b5b");
    const bx = cx0, by = fy + 26, bw = 110, bh = 16;
    ctx.fillStyle = "#222"; rr(ctx, bx, by, bw, bh, 4); ctx.fill();
    const fc1 = lowf ? "#27e0e0" : "#ffd23e", fc2 = lowf ? "#0aa" : "#ff8a00";
    const fg = ctx.createLinearGradient(bx, 0, bx + bw, 0); fg.addColorStop(0, fc2); fg.addColorStop(1, fc1);
    ctx.fillStyle = fg; rr(ctx, bx, by, Math.round(bw * fuel / 99), bh, 4); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.25)"; ctx.lineWidth = 1; rr(ctx, bx, by, bw, bh, 4); ctx.stroke();
    txt(pad(fuel, 3), cx0, by + 22, 22, fc1);
  }

  /* ---------- DONGU ---------- */
  function loop(t) {
    if (!running) return;
    if (!lastT) lastT = t;
    let dt = (t - lastT) / 1000; lastT = t;
    if (dt > 0.05) dt = 0.05;
    update(dt);
    if (running) raf = requestAnimationFrame(loop);
  }
  function start() {
    reset(); running = true; dead = false;
    overlay.classList.add("hidden");
    Sound.warm(); Sound.go(); Sound.engineStart();
    lastT = 0; cancelAnimationFrame(raf); raf = requestAnimationFrame(loop);
  }
  function gameOver(reason) {
    if (dead) return; dead = true; running = false;
    cancelAnimationFrame(raf); Sound.crash();
    if (score > hi) { hi = score; localStorage.setItem("roadHi", String(hi)); }
    const ttl = reason === "yakit" ? "YAKIT BİTTİ" : (reason === "kenar" ? "YOLDAN ÇIKTIN" : "ÇARPTIN!");
    overlay.querySelector("h2").textContent = ttl;
    ovText.innerHTML = 'Skor: <b style="color:#ffd23e">' + pad(score, 6) + '</b><br>Rekor: <b style="color:#6fe08a">' + pad(hi, 6) + '</b>';
    startBtn.textContent = "TEKRAR";
    overlay.classList.remove("hidden");
    draw();
  }

  /* ---------- GIRIS ---------- */
  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (["arrowleft", "a"].includes(k)) { steerLeft = true; dragX = null; e.preventDefault(); }
    else if (["arrowright", "d"].includes(k)) { steerRight = true; dragX = null; e.preventDefault(); }
    else if (["arrowup", "w"].includes(k)) { gas = true; e.preventDefault(); }
    else if (["arrowdown", "s"].includes(k)) { brake = true; e.preventDefault(); }
    else if (k === "enter") { if (!running) start(); }
  });
  window.addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    if (["arrowleft", "a"].includes(k)) steerLeft = false;
    else if (["arrowright", "d"].includes(k)) steerRight = false;
    else if (["arrowup", "w"].includes(k)) gas = false;
    else if (["arrowdown", "s"].includes(k)) brake = false;
  });

  function logicalX(clientX) {
    const r = canvas.getBoundingClientRect();
    return (clientX - r.left) * (VW / r.width);
  }
  canvas.addEventListener("touchstart", (e) => { dragX = logicalX(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
  canvas.addEventListener("touchmove", (e) => { dragX = logicalX(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
  canvas.addEventListener("touchend", () => { dragX = null; }, { passive: true });
  let md = false;
  canvas.addEventListener("mousedown", (e) => { md = true; dragX = logicalX(e.clientX); });
  canvas.addEventListener("mousemove", (e) => { if (md) dragX = logicalX(e.clientX); });
  window.addEventListener("mouseup", () => { md = false; dragX = null; });

  function hold(el, on, off) {
    el.addEventListener("touchstart", (e) => { e.preventDefault(); on(); }, { passive: false });
    el.addEventListener("touchend", (e) => { e.preventDefault(); off(); }, { passive: false });
    el.addEventListener("mousedown", on); el.addEventListener("mouseup", off); el.addEventListener("mouseleave", off);
  }
  hold(document.getElementById("cLeft"),  () => { steerLeft = true; dragX = null; }, () => steerLeft = false);
  hold(document.getElementById("cRight"), () => { steerRight = true; dragX = null; }, () => steerRight = false);
  hold(document.getElementById("cGas"),   () => gas = true,   () => gas = false);
  hold(document.getElementById("cBrake"), () => brake = true, () => brake = false);

  startBtn.addEventListener("click", start);
  window.addEventListener("resize", resize);

  buildAssets();
  reset(); resize(); draw();
})();
</script>
</body>
</html>
